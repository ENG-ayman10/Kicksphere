<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KickSphere | Premium Dashboard</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(24, 24, 27, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary: #38bdf8;
      --primary-hover: #0ea5e9;
      --primary-glow: 0 0 20px rgba(56, 189, 248, 0.4);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #f43f5e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Glassmorphism Utilities */
    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Navbar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      margin: 1rem;
      border-radius: 20px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(244, 63, 94, 0.2);
      color: var(--danger);
      transition: all 0.3s ease;
    }
    .status-badge.connected {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
    }
    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Layout */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 0 1rem 2rem 1rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .panel {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 450px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.8rem;
    }

    h2 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }

    /* Inputs & Buttons */
    button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: var(--primary-hover); box-shadow: var(--primary-glow); transform: translateY(-1px); }
    
    input {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus { border-color: var(--primary); }

    .input-group { display: flex; gap: 10px; margin-bottom: 10px; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    /* Match Cards */
    .content-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 5px;
    }

    .match-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1rem;
      transition: transform 0.2s;
    }
    .match-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.05); }
    .match-league { font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: 600; }
    .match-score { background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 6px; font-variant-numeric: tabular-nums; }
    .match-status { font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 8px; }

    /* Chat System */
    .chat-box {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 1rem;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-bubble {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      animation: popIn 0.3s ease;
    }
    .chat-bubble.mine {
      align-self: flex-end;
      background: var(--primary);
      color: #000;
      border-bottom-right-radius: 2px;
    }
    .chat-bubble.others {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      border-bottom-left-radius: 2px;
    }
    .chat-user { font-size: 0.7rem; opacity: 0.7; margin-bottom: 2px; display: block; font-weight: 600; }

    /* News Cards */
    .news-card {
      display: flex;
      gap: 15px;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .news-card:hover { border-color: var(--primary); }
    .news-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: #27272a; }
    .news-content h3 { font-size: 1rem; margin-bottom: 5px; }
    .news-content p { font-size: 0.8rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }
    .toast {
      background: rgba(16, 185, 129, 0.9);
      backdrop-filter: blur(10px);
      color: white;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show { transform: translateX(0); }
    .toast-icon { font-size: 1.5rem; }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
      .panel { height: 400px; }
    }
  </style>
</head>
<body>

  <header class="glass">
    <div class="logo">⚽ KickSphere</div>
    <div class="status-badge" id="connStatus">
      <div class="pulse"></div>
      <span id="connText">Offline</span>
    </div>
  </header>

  <div class="dashboard">
    
    <!-- LIVE MATCHES -->
    <div class="glass panel">
      <div class="panel-header">
        <h2>🔴 Live Broadcast</h2>
        <button onclick="fetchLiveMatches()">Refresh</button>
      </div>
      <div class="content-area" id="matchesContainer">
        <div style="color: var(--text-muted); text-align: center; margin-top: 2rem;">Waiting for live matches...</div>
      </div>
    </div>

    <!-- CHAT ROOM -->
    <div class="glass panel">
      <div class="panel-header">
        <h2>💬 Match Room</h2>
        <div class="input-group" style="margin: 0; width: 60%;">
          <input type="text" id="matchIdInput" placeholder="Match ID..." value="101" style="padding: 0.4rem;">
          <button onclick="joinMatch()" style="padding: 0.4rem 1rem;">Join</button>
        </div>
      </div>
      <div class="chat-box" id="chatBox">
        <div style="color: var(--text-muted); text-align: center; margin-top: 2rem; font-size: 0.9rem;">Join a room to start chatting</div>
      </div>
      <div class="input-group" style="margin-bottom: 0;">
        <input type="text" id="chatInput" placeholder="Type your message..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>

    <!-- NEWS -->
    <div class="glass panel">
      <div class="panel-header">
        <h2>📰 Latest News</h2>
        <button onclick="fetchNews()">Fetch</button>
      </div>
      <div class="content-area" id="newsContainer">
        <div style="color: var(--text-muted); text-align: center; margin-top: 2rem;">Click Fetch to load news</div>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="glass panel">
      <div class="panel-header">
        <h2>🔍 Search Engine</h2>
      </div>
      <div class="input-group">
        <input type="text" id="searchInput" placeholder="Search teams, leagues, players..." onkeypress="if(event.key === 'Enter') doSearch()">
        <button onclick="doSearch()">Search</button>
      </div>
      <div class="content-area" id="searchContainer" style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-top: 10px;">
        <div style="color: var(--text-muted); text-align: center; margin-top: 2rem; font-size: 0.9rem;">Search results will appear here</div>
      </div>
    </div>

  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io("http://localhost:3000");
    const MY_USER_NAME = "You";
    let currentMatchId = null;

    // --- CONNECTION ---
    const badge = document.getElementById('connStatus');
    const badgeText = document.getElementById('connText');

    socket.on("connect", () => {
      badge.classList.add('connected');
      badgeText.innerText = "Connected";
      // Simulate logging in for notifications
      socket.emit("joinUser", "test_user_123");
    });

    socket.on("disconnect", () => {
      badge.classList.remove('connected');
      badgeText.innerText = "Offline";
    });

    // --- TOAST NOTIFICATIONS ---
    function showToast(title, message, isGoal = false) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      if(isGoal) {
        toast.style.background = 'rgba(236, 72, 153, 0.9)'; // Pinkish for goals
      }
      toast.innerHTML = `
        <div class="toast-icon">${isGoal ? '⚽' : '🔔'}</div>
        <div>
          <div style="font-weight: 600; font-size: 1rem;">${title}</div>
          <div style="font-size: 0.85rem; opacity: 0.9;">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      
      // Animate in
      setTimeout(() => toast.classList.add('show'), 100);
      
      // Animate out
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 5000);
    }

    // --- LIVE MATCHES & EVENTS ---
    async function fetchLiveMatches() {
      try {
        const res = await fetch('http://localhost:3000/api/matches/live');
        const json = await res.json();
        renderMatches(json.data || []);
      } catch (err) {
        console.error(err);
      }
    }

    socket.on("liveMatches", (matches) => {
      renderMatches(matches);
    });

    socket.on("liveEvent", (event) => {
      showToast("Live Event!", `${event.type.toUpperCase()} for ${event.team} ⚡`, true);
    });

    socket.on("notification", (data) => {
      showToast(data.title, data.message);
    });

    function renderMatches(matches) {
      const container = document.getElementById('matchesContainer');
      if (!matches || matches.length === 0) {
        container.innerHTML = `<div style="color: var(--text-muted); text-align: center; margin-top: 2rem;">No live matches currently.</div>`;
        return;
      }
      
      container.innerHTML = matches.map(m => `
        <div class="match-card">
          <div class="match-league">${m.league || 'Unknown League'}</div>
          <div class="match-teams">
            <span>${m.homeTeam || m.home?.name || 'TBA'}</span>
            <span class="match-score">${m.homeScore ?? 0} - ${m.awayScore ?? 0}</span>
            <span>${m.awayTeam || m.away?.name || 'TBA'}</span>
          </div>
          <div class="match-status">${m.status || 'Live'}</div>
        </div>
      `).join('');
    }

    // --- CHAT SYSTEM ---
    function joinMatch() {
      const matchId = document.getElementById('matchIdInput').value.trim();
      if (!matchId) return;
      currentMatchId = matchId;
      socket.emit("joinMatch", matchId);
      
      const box = document.getElementById('chatBox');
      box.innerHTML = `<div style="text-align: center; font-size: 0.8rem; color: var(--success); margin: 10px 0;">🚪 Joined room: ${matchId}</div>`;
    }

    function sendMsg() {
      if (!currentMatchId) return alert("Join a match room first!");
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;

      socket.emit("sendMessage", {
        matchId: currentMatchId,
        user: MY_USER_NAME,
        message: msg
      });
      
      input.value = "";
    }

    socket.on("newMessage", (data) => {
      const box = document.getElementById('chatBox');
      const isMine = data.user === MY_USER_NAME;
      
      const bubble = document.createElement('div');
      bubble.className = `chat-bubble ${isMine ? 'mine' : 'others'}`;
      bubble.innerHTML = `
        ${!isMine ? `<span class="chat-user">${data.user}</span>` : ''}
        ${data.message}
      `;
      
      box.appendChild(bubble);
      box.scrollTop = box.scrollHeight;
    });

    // --- NEWS SYSTEM ---
    async function fetchNews() {
      try {
        const res = await fetch('http://localhost:3000/api/news?limit=5');
        const json = await res.json();
        const container = document.getElementById('newsContainer');
        
        if (!json.data || json.data.length === 0) {
          container.innerHTML = `<div style="color: var(--text-muted); text-align: center;">No news available.</div>`;
          return;
        }

        container.innerHTML = json.data.map(news => `
          <div class="news-card">
            <img src="${news.imageUrl || 'https://via.placeholder.com/80x80/27272a/fff?text=News'}" class="news-img" alt="News">
            <div class="news-content">
              <h3>${news.title}</h3>
              <p>${news.excerpt}</p>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    // --- SEARCH SYSTEM ---
    async function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      
      try {
        const res = await fetch(`http://localhost:3000/api/search?q=${query}`);
        const json = await res.json();
        const container = document.getElementById('searchContainer');
        
        const data = json.data;
        if (!data || (data.matches.length === 0 && data.teams.length === 0 && data.players.length === 0)) {
          container.innerHTML = `<div style="text-align: center; color: var(--danger); padding: 1rem;">No results found for "${query}"</div>`;
          return;
        }

        let html = '';
        if (data.teams.length > 0) {
          html += `<div style="color: var(--primary); margin-bottom: 5px; font-weight: 600;">Teams</div>`;
          html += data.teams.map(t => `<div style="padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 5px;">🛡️ ${t.name}</div>`).join('');
        }
        if (data.matches.length > 0) {
          html += `<div style="color: var(--primary); margin: 10px 0 5px 0; font-weight: 600;">Matches</div>`;
          html += data.matches.map(m => `<div style="padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; margin-bottom: 5px;">⚽ ${m.homeTeam || 'TBA'} vs ${m.awayTeam || 'TBA'}</div>`).join('');
        }
        
        container.innerHTML = html;
      } catch (err) {
        console.error(err);
      }
    }

    // Auto-fetch initial data
    setTimeout(() => {
      fetchLiveMatches();
      fetchNews();
    }, 1000);

  </script>
</body>
</html>
